<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>곽찬혁 포트폴리오</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #172033;
        --muted: #5f6c80;
        --line: #d9e0ea;
        --accent: #1267d8;
        --accent-dark: #0d4ea6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
          "Apple SD Gothic Neo", Arial, sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 3vw, 2.25rem);
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      a.button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      a.button:hover {
        border-color: var(--accent-dark);
      }

      a.button.primary:hover {
        background: var(--accent-dark);
      }

      .viewer {
        overflow: hidden;
        width: 100%;
        height: min(78vh, 920px);
        min-height: 560px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 16px 42px rgb(31 45 61 / 10%);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1180px);
          padding: 20px 0;
        }

        header {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          justify-content: stretch;
        }

        a.button {
          flex: 1 1 150px;
        }

        .viewer {
          height: 72vh;
          min-height: 440px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>곽찬혁 포트폴리오</h1>
          <p>브라우저에서 바로 확인하거나 PDF 파일로 다운로드할 수 있습니다.</p>
        </div>
        <nav class="actions" aria-label="포트폴리오 PDF 작업">
          <a class="button primary" href="./Portfolio_%EA%B3%BD%EC%B0%AC%ED%98%81.pdf" download>
            PDF 다운로드
          </a>
          <a class="button" href="./Portfolio_%EA%B3%BD%EC%B0%AC%ED%98%81.pdf" target="_blank" rel="noopener">
            새 탭에서 열기
          </a>
        </nav>
      </header>

      <section class="viewer" aria-label="포트폴리오 PDF 미리보기">
        <iframe
          title="곽찬혁 포트폴리오 PDF"
          src="./Portfolio_%EA%B3%BD%EC%B0%AC%ED%98%81.pdf"
        ></iframe>
      </section>
    </main>
  </body>
</html>
